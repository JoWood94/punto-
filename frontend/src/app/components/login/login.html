<div class="login-container">
  <div class="login-inner">
    <div class="login-header">
      <img src="punto_logo_no_bg.png" alt="punto! logo" class="login-logo" />
      <p class="subtitle mat-body-medium">{{ isRecoveringPassword ? 'Recupera Password' : (isRegistering ? 'Crea un Account' : 'Accedi al tuo Account') }}</p>
    </div>

    <form (ngSubmit)="isRecoveringPassword ? recoverPassword() : onSubmit()">
      <mat-form-field appearance="outline" class="full-width">
        <mat-label>Email</mat-label>
        <input matInput type="email" name="email" [(ngModel)]="email" required autocomplete="email">
      </mat-form-field>

      <ng-container *ngIf="!isRecoveringPassword">
        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Password</mat-label>
          <input matInput [type]="showPassword ? 'text' : 'password'" name="password" [(ngModel)]="password" required autocomplete="current-password">
          <button mat-icon-button matSuffix type="button" (click)="showPassword = !showPassword"
                  [attr.aria-label]="showPassword ? 'Nascondi password' : 'Mostra password'">
            <mat-icon>{{ showPassword ? 'visibility_off' : 'visibility' }}</mat-icon>
          </button>
        </mat-form-field>

        <mat-form-field appearance="outline" class="full-width" *ngIf="isRegistering">
          <mat-label>Conferma Password</mat-label>
          <input matInput type="password" name="confirmPassword" [(ngModel)]="confirmPassword" required autocomplete="new-password">
        </mat-form-field>

        <div class="forgot-password" *ngIf="!isRegistering">
          <button mat-button type="button" (click)="isRecoveringPassword = true">Password dimenticata?</button>
        </div>
      </ng-container>

      <div class="actions">
        <button mat-flat-button type="submit" class="submit-btn"
                [disabled]="isRecoveringPassword ? !email : (!email || !password)">
          {{ isRecoveringPassword ? 'Invia Link di Recupero' : (isRegistering ? 'Registrati' : 'Accedi') }}
        </button>
      </div>
    </form>

    <div class="secondary-actions">
      <button mat-button type="button"
              (click)="isRegistering = !isRegistering; isRecoveringPassword = false"
              *ngIf="!isRecoveringPassword">
        {{ isRegistering ? 'Hai già un account? Accedi' : 'Non hai un account? Registrati' }}
      </button>
      <button mat-button type="button"
              (click)="isRecoveringPassword = false"
              *ngIf="isRecoveringPassword">
        Torna al Login
      </button>
    </div>
  </div>
</div>
