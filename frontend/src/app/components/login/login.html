<div class="login-container mat-app-background">
  <mat-card class="login-card">
    <div class="custom-header">
      <img src="punto_logo_no_bg.png" alt="punto! logo" class="login-logo" />
      <div class="subtitle mat-body-medium">{{ isRecoveringPassword ? 'Recupera Password' : (isRegistering ? 'Crea un Account' : 'Accedi al tuo Account') }}</div>
    </div>
    
    <mat-card-content class="form-content">
      <form (ngSubmit)="isRecoveringPassword ? recoverPassword() : onSubmit()">
        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Email</mat-label>
          <input matInput type="email" name="email" [(ngModel)]="email" required>
        </mat-form-field>

        <ng-container *ngIf="!isRecoveringPassword">
          <mat-form-field appearance="outline" class="full-width">
            <mat-label>Password</mat-label>
            <input matInput [type]="showPassword ? 'text' : 'password'" name="password" [(ngModel)]="password" required>
            <button mat-icon-button matSuffix type="button" (click)="showPassword = !showPassword"
                    [attr.aria-label]="showPassword ? 'Nascondi password' : 'Mostra password'">
              <mat-icon>{{ showPassword ? 'visibility_off' : 'visibility' }}</mat-icon>
            </button>
          </mat-form-field>

          <mat-form-field appearance="outline" class="full-width" *ngIf="isRegistering">
            <mat-label>Conferma Password</mat-label>
            <input matInput type="password" name="confirmPassword" [(ngModel)]="confirmPassword" required>
          </mat-form-field>
          
          <div class="forgot-password" *ngIf="!isRegistering" style="text-align: right; margin-bottom: 16px;">
            <button mat-button type="button" color="primary" (click)="isRecoveringPassword = true" style="font-size: 0.9em; padding: 0;">Password dimenticata?</button>
          </div>
        </ng-container>

        <div class="actions">
          <button mat-flat-button color="primary" type="submit" [disabled]="isRecoveringPassword ? !email : (!email || !password)">
            {{ isRecoveringPassword ? 'Invia Link di Recupero' : (isRegistering ? 'Registrati' : 'Accedi') }}
          </button>
        </div>
      </form>
    </mat-card-content>
    
    <mat-card-actions align="end" style="flex-direction: column; align-items: stretch; padding: 8px 16px;">
      <button mat-button type="button" (click)="isRegistering = !isRegistering; isRecoveringPassword = false" *ngIf="!isRecoveringPassword">
        {{ isRegistering ? 'Hai già un account? Accedi' : 'Non hai un account? Registrati' }}
      </button>
      <button mat-button type="button" (click)="isRecoveringPassword = false" *ngIf="isRecoveringPassword">
        Torna al Login
      </button>
    </mat-card-actions>
  </mat-card>
</div>
