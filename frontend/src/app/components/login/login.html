<div class="login-container mat-app-background">
  <mat-card class="login-card" appearance="outlined">
    <mat-card-header>
      <mat-card-title>punto!</mat-card-title>
      <mat-card-subtitle>{{ isRegistering ? 'Crea un Account' : 'Accedi al tuo Account' }}</mat-card-subtitle>
    </mat-card-header>
    
    <mat-card-content class="form-content">
      <form (ngSubmit)="onSubmit()">
        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Email</mat-label>
          <input matInput type="email" name="email" [(ngModel)]="email" required>
        </mat-form-field>

        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Password</mat-label>
          <input matInput type="password" name="password" [(ngModel)]="password" required>
        </mat-form-field>

        <div class="actions">
          <button mat-flat-button color="primary" type="submit" [disabled]="!email || !password">
            {{ isRegistering ? 'Registrati' : 'Accedi' }}
          </button>
        </div>
      </form>
    </mat-card-content>
    
    <mat-card-actions align="end">
      <button mat-button (click)="isRegistering = !isRegistering">
        {{ isRegistering ? 'Hai già un account? Accedi' : 'Non hai un account? Registrati' }}
      </button>
    </mat-card-actions>
  </mat-card>
</div>
