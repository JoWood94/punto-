<mat-sidenav-container class="dashboard-container">

  <mat-sidenav mode="side" [opened]="!isMobile || (activeNote === undefined && currentMainView === 'list')" class="notes-sidenav"
    [class.mobile-full]="isMobile">
    <div style="display: flex; flex-direction: column; height: 100%;">
      <div class="sidenav-header" [class.mobile-header]="isMobile" style="position: relative;">
        <h2 *ngIf="!isMobile">Le mie Note</h2>
        <img src="punto_logo_no_bg.png" alt="punto! logo" class="mobile-center-logo" *ngIf="isMobile" />
        <span class="spacer" *ngIf="isMobile"></span>
        <button mat-icon-button
          (click)="setDefaultView('calendar'); activeNote = undefined"
          *ngIf="isMobile"
          matTooltip="Vista Calendario"
          [class.mobile-actions]="isMobile">
          <mat-icon>calendar_month</mat-icon>
        </button>
      </div>

      <!-- Search bar -->
      <div class="search-bar-wrapper">
        <mat-form-field appearance="outline" class="search-field">
          <mat-icon matPrefix>search</mat-icon>
          <mat-label>Cerca note</mat-label>
          <input matInput [(ngModel)]="searchQuery" (ngModelChange)="onSearchChange()" placeholder="Titolo o contenuto..." />
          <button mat-icon-button matSuffix *ngIf="searchQuery" (click)="clearSearch()" type="button" aria-label="Cancella ricerca">
            <mat-icon>close</mat-icon>
          </button>
        </mat-form-field>
      </div>

      <!-- TODO: tag filter disabilitato temporaneamente
      <div class="tag-filters" *ngIf="allTags.length > 0">
        <mat-chip-set aria-label="Filtra per etichetta">
          <mat-chip *ngFor="let tag of allTags"
                    [class.tag-chip-active]="isTagSelected(tag)"
                    (click)="toggleTagFilter(tag)"
                    class="tag-filter-chip">
            #{{ tag }}
          </mat-chip>
        </mat-chip-set>
        <button mat-button *ngIf="selectedTags.length > 0"
                (click)="clearTagFilters()" class="clear-tags-btn" type="button">
          <mat-icon>filter_alt_off</mat-icon> Rimuovi filtri
        </button>
      </div>
      -->

      <!-- Notes list -->
      <mat-nav-list class="notes-list">
        <ng-container *ngFor="let note of filteredNotes">
          <a mat-list-item (click)="selectNote(note)" [class.active-note]="activeNote?.id === note.id"
            class="single-note" [class.note-pinned]="note.pinned">

            <!-- Pin indicator -->
            <mat-icon matListItemIcon class="pin-icon" *ngIf="note.pinned" color="primary">push_pin</mat-icon>

            <span matListItemTitle class="note-item-title">{{ note.title || 'Nuova Nota' }}</span>

            <!-- Content preview (from first text block) -->
            <span matListItemLine class="note-item-preview"
                  *ngIf="getNotePreview(note) as preview"
                  [innerHTML]="preview">
            </span>

            <!-- TODO: tags disabilitati temporaneamente
            <div matListItemLine class="note-tags-row" *ngIf="note.tags && note.tags.length > 0">
              <span class="note-tag-badge" *ngFor="let tag of note.tags">#{{ tag }}</span>
            </div>
            -->

            <!-- Checklist progress -->
            <div matListItemLine class="note-checklist-progress"
                 *ngIf="getChecklistProgress(note) as progress">
              <mat-icon class="progress-icon">check_circle</mat-icon>
              <span class="progress-text">{{ progress.done }}/{{ progress.total }}</span>
              <div class="progress-bar-track">
                <div class="progress-bar-fill"
                     [style.width.%]="(progress.done / progress.total) * 100">
                </div>
              </div>
            </div>

            <!-- Actions: pin + delete -->
            <div matListItemMeta class="note-meta-actions">
              <button mat-icon-button
                      (click)="togglePin(note, $event)"
                      [matTooltip]="note.pinned ? 'Rimuovi pin' : 'Fissa nota'"
                      class="pin-btn"
                      [class.pin-active]="note.pinned">
                <mat-icon>push_pin</mat-icon>
              </button>
              <button mat-icon-button (click)="deleteNote(note, $event)" matTooltip="Elimina" class="delete-btn">
                <mat-icon>delete_outline</mat-icon>
              </button>
            </div>
          </a>
          <mat-divider></mat-divider>
        </ng-container>

        <!-- Empty states -->
        <div class="empty-state" *ngIf="filteredNotes.length === 0 && !searchQuery">
          <mat-icon>edit_note</mat-icon>
          <p>Ancora nessuna nota.</p>
          <button mat-flat-button color="primary" (click)="openNoteEditor()">
            <mat-icon>add</mat-icon>
            Nuova nota
          </button>
        </div>
        <div class="empty-state" *ngIf="filteredNotes.length === 0 && searchQuery">
          <mat-icon>search_off</mat-icon>
          <p>Nessun risultato.</p>
        </div>
      </mat-nav-list>

      <!-- FAB mobile nella lista note -->
      <div class="sidenav-list-fab-area" *ngIf="isMobile && currentMainView === 'list'">
        <button mat-fab extended color="primary" (click)="openNoteEditor()" class="new-note-fab">
          <mat-icon>edit</mat-icon>
          Nuova Nota
        </button>
      </div>

      <div class="sidenav-footer" *ngIf="isMobile">
        <button mat-icon-button (click)="logout()" aria-label="Esci" matTooltip="Logout" color="warn">
          <mat-icon>logout</mat-icon>
        </button>
      </div>
    </div>
  </mat-sidenav>

  <mat-sidenav-content class="dashboard-content" *ngIf="!isMobile || activeNote !== undefined || currentMainView === 'calendar'">
    <mat-toolbar class="app-header" style="position: relative;">
      <button mat-icon-button (click)="handleBackButton()" class="back-button" *ngIf="isMobile" aria-label="Torna indietro">
        <mat-icon>arrow_back</mat-icon>
      </button>

      <img src="punto_logo_no_bg.png" alt="punto! logo" class="mobile-center-logo" *ngIf="isMobile" />
      <img src="punto_logo_no_bg.png" alt="punto! logo" class="header-logo" *ngIf="!isMobile" />

      <span class="spacer"></span>

      <button mat-icon-button *ngIf="!isMobile"
              (click)="currentMainView = 'calendar'; activeNote = undefined"
              [class.calendar-btn-active]="currentMainView === 'calendar' && activeNote === undefined"
              matTooltip="Vista Calendario"
              aria-label="Vista Calendario">
        <mat-icon>calendar_month</mat-icon>
      </button>

      <button mat-icon-button (click)="logout()" *ngIf="!isMobile" aria-label="Esci" matTooltip="Logout" color="warn">
        <mat-icon>logout</mat-icon>
      </button>
    </mat-toolbar>

    <div class="editor-wrapper editor-enter" *ngIf="activeNote !== undefined">
      <app-note-editor [selectedNote]="activeNote" [initialReminderDate]="newNoteCalendarDate" (closeEditor)="closeEditor()">
      </app-note-editor>
    </div>

    <div class="calendar-wrapper" *ngIf="currentMainView === 'calendar' && activeNote === undefined">
      <app-calendar-view [notes]="allNotes" (noteSelected)="onCalendarNoteSelected($event)">
      </app-calendar-view>
    </div>

    <div class="no-selection-state" *ngIf="currentMainView === 'list' && activeNote === undefined && !isMobile">
      <mat-icon>edit_document</mat-icon>
      <h2>Seleziona una nota o creane una nuova</h2>
      <button mat-flat-button color="primary" (click)="openNoteEditor()">Nuova Nota</button>
    </div>

    <!-- FAB fuori dal drawer: position:fixed funziona correttamente -->
    <div class="sidenav-fab-area" *ngIf="activeNote === undefined && (!isMobile || currentMainView === 'calendar')">
      <button mat-fab extended color="primary" (click)="isMobile ? openNoteEditorFromCalendar() : openNoteEditor()" class="new-note-fab">
        <mat-icon>edit</mat-icon>
        Nuova Nota
      </button>
    </div>
  </mat-sidenav-content>

</mat-sidenav-container>
