<mat-sidenav-container class="dashboard-container">
  
  <mat-sidenav mode="side" [opened]="!isMobile || activeNote === undefined" class="notes-sidenav" [class.mobile-full]="isMobile">
    <div class="sidenav-header">
      <h2>Le mie Note</h2>
      <button mat-icon-button (click)="openNoteEditor()" color="primary" matTooltip="Nuova Nota">
        <mat-icon>add</mat-icon>
      </button>
    </div>
    
    <mat-nav-list class="notes-list" *ngIf="notes$ | async as notes">
      <a mat-list-item *ngFor="let note of notes" (click)="selectNote(note)" [class.active-note]="activeNote?.id === note.id">
        <span matListItemTitle>{{ note.title || 'Nuova Nota' }}</span>
        <button mat-icon-button matListItemMeta (click)="deleteNote(note, $event)" matTooltip="Elimina">
          <mat-icon>delete</mat-icon>
        </button>
      </a>
      <div class="empty-state" *ngIf="notes.length === 0">
        <mat-icon>note_add</mat-icon>
        <p>Nessuna nota trovata.</p>
      </div>
    </mat-nav-list>

    <div class="sidenav-footer">
      <button mat-icon-button [matMenuTriggerFor]="sidenavMenu" matTooltip="Impostazioni">
        <mat-icon>settings</mat-icon>
      </button>
      <mat-menu #sidenavMenu="matMenu">
        <button mat-menu-item [matMenuTriggerFor]="sideThemeMenu">
          <mat-icon>palette</mat-icon>
          <span>Scegli Tema</span>
        </button>
        <button mat-menu-item (click)="logout()">
          <mat-icon>logout</mat-icon>
          <span>Esci</span>
        </button>
      </mat-menu>
      <mat-menu #sideThemeMenu="matMenu">
        <button mat-menu-item *ngFor="let color of themeColors" (click)="changeThemeColor(color)">
          <div class="color-circle" [style.backgroundColor]="color"></div>
          Applica Tema
        </button>
      </mat-menu>
    </div>
  </mat-sidenav>

  <mat-sidenav-content class="dashboard-content" *ngIf="!isMobile || activeNote !== undefined">
    <mat-toolbar class="app-header">
      <button mat-icon-button (click)="closeEditor()" class="back-button" *ngIf="isMobile" aria-label="Torna indietro">
        <mat-icon>arrow_back</mat-icon>
      </button>
      
      <img src="punto_logo.png" alt="punto! logo" class="header-logo" />
      
      <span class="spacer"></span>
      
      <button mat-icon-button [matMenuTriggerFor]="userMenu" aria-label="Menu utente">
        <mat-icon>account_circle</mat-icon>
      </button>

      <mat-menu #userMenu="matMenu">
        <button mat-menu-item [matMenuTriggerFor]="themeMenu">
          <mat-icon>palette</mat-icon>
          <span>Scegli Tema</span>
        </button>
        <button mat-menu-item (click)="logout()">
          <mat-icon>logout</mat-icon>
          <span>Esci</span>
        </button>
      </mat-menu>

      <mat-menu #themeMenu="matMenu">
        <button mat-menu-item *ngFor="let color of themeColors" (click)="changeThemeColor(color)">
          <div class="color-circle" [style.backgroundColor]="color"></div>
          Applica Tema
        </button>
      </mat-menu>
    </mat-toolbar>

    <div class="editor-wrapper" *ngIf="activeNote !== undefined">
      <app-note-editor 
        [selectedNote]="activeNote" 
        (closeEditor)="closeEditor()">
      </app-note-editor>
    </div>
    
    <div class="no-selection-state" *ngIf="activeNote === undefined && !isMobile">
      <mat-icon>edit_document</mat-icon>
      <h2>Seleziona una nota o creane una nuova</h2>
      <button mat-flat-button color="primary" (click)="openNoteEditor()">Nuova Nota</button>
    </div>
  </mat-sidenav-content>
</mat-sidenav-container>
