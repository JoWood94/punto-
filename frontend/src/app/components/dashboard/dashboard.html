<mat-toolbar color="primary" class="app-header">
  <span>punto!</span>
  <span class="spacer"></span>
  
  <button mat-icon-button [matMenuTriggerFor]="themeMenu">
    <mat-icon>palette</mat-icon>
  </button>
  <mat-menu #themeMenu="matMenu">
    <button mat-menu-item *ngFor="let color of themeColors" (click)="changeThemeColor(color)">
      <div class="color-circle" [style.backgroundColor]="color"></div>
      Tema
    </button>
  </mat-menu>

  <button mat-icon-button (click)="logout()">
    <mat-icon>logout</mat-icon>
  </button>
</mat-toolbar>

<main class="dashboard-content">
  <div class="notes-grid" *ngIf="notes$ | async as notes">
    <mat-card *ngFor="let note of notes" class="note-card" (click)="openNoteEditor(note)" appearance="outlined">
      <mat-card-header>
        <mat-card-title>{{ note.title }}</mat-card-title>
      </mat-card-header>
      <mat-card-content>
        <div class="note-preview" [innerHTML]="note.content"></div>
        <div class="tags">
          <span class="tag" *ngFor="let tag of note.tags">#{{ tag }}</span>
        </div>
      </mat-card-content>
    </mat-card>
    
    <div class="empty-state" *ngIf="notes.length === 0">
      <mat-icon>note_add</mat-icon>
      <p>Nessuna nota trovata. Creane una nuova!</p>
    </div>
  </div>
</main>

<button mat-fab class="fab-bottom-right" color="primary" (click)="openNoteEditor()">
  <mat-icon>add</mat-icon>
</button>
