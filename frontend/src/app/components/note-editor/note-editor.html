<h2 mat-dialog-title>{{ data.note ? 'Modifica Nota' : 'Nuova Nota' }}</h2>

<mat-dialog-content>
  <div class="editor-form">
    <mat-form-field appearance="outline" class="full-width title-input">
      <mat-label>Titolo</mat-label>
      <input matInput [(ngModel)]="note.title" placeholder="Inserisci il titolo della nota">
    </mat-form-field>

    <div class="rich-text-wrapper">
      <div class="rich-text-toolbar">
        <button mat-icon-button (click)="execCommand('bold')" type="button" tabindex="-1"><mat-icon>format_bold</mat-icon></button>
        <button mat-icon-button (click)="execCommand('italic')" type="button" tabindex="-1"><mat-icon>format_italic</mat-icon></button>
        <button mat-icon-button (click)="execCommand('insertUnorderedList')" type="button" tabindex="-1"><mat-icon>format_list_bulleted</mat-icon></button>
      </div>
      <div class="rich-text-editor full-width" #editor contenteditable="true" placeholder="Scrivi i tuoi appunti qui..."></div>
    </div>

    <!-- Tags via Angular Material Chips -->
    <mat-form-field appearance="outline" class="full-width margin-top">
      <mat-label>Tag</mat-label>
      <mat-chip-grid #chipGrid aria-label="Inserisci tag">
        <mat-chip-row *ngFor="let tag of note.tags" (removed)="removeTag(tag)">
          {{tag}}
          <button matChipRemove [attr.aria-label]="'rimuovi ' + tag">
            <mat-icon>cancel</mat-icon>
          </button>
        </mat-chip-row>
        <input placeholder="Aggiungi un nuovo tag..."
               [matChipInputFor]="chipGrid"
               [matChipInputSeparatorKeyCodes]="separatorKeysCodes"
               (matChipInputTokenEnd)="addTag($event)">
      </mat-chip-grid>
    </mat-form-field>

    <!-- Mappa / Indirizzo -->
    <div class="address-container">
      <mat-form-field appearance="outline" class="full-width">
        <mat-label>Indirizzo o Luogo (Mappe)</mat-label>
        <input matInput [(ngModel)]="note.address" placeholder="Es: Via Roma 1, Milano">
        <button mat-icon-button matSuffix *ngIf="note.address" (click)="openMaps()" type="button" matTooltip="Apri su OpenStreetMap">
          <mat-icon>map</mat-icon>
        </button>
      </mat-form-field>
    </div>

    <!-- Promemoria -->
    <mat-form-field appearance="outline" class="full-width">
      <mat-label>Imposta Promemoria (Push Notification)</mat-label>
      <input matInput type="datetime-local" [(ngModel)]="reminderDateStr">
      <mat-icon matSuffix color="primary">notifications_active</mat-icon>
    </mat-form-field>
  </div>
</mat-dialog-content>

<mat-dialog-actions align="end">
  <button mat-button *ngIf="data.note" color="warn" (click)="deleteNote()">Elimina</button>
  <button mat-button mat-dialog-close>Annulla</button>
  <button mat-flat-button color="primary" (click)="save()">Salva</button>
</mat-dialog-actions>
