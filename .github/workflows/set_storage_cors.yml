name: Set Firebase Storage CORS (One-shot)

on:
  workflow_dispatch:

jobs:
  set_cors:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Write service account key
        run: echo '${{ secrets.FIREBASE_SERVICE_ACCOUNT }}' > /tmp/sa.json

      - name: Authenticate with Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}

      - name: Set up Google Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Apply CORS to Firebase Storage bucket
        run: |
          gsutil cors set server/cors.json gs://punto-84646.firebasestorage.app
          gsutil cors get gs://punto-84646.firebasestorage.app
