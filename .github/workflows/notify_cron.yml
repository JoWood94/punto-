name: Send Firebase Push Notifications (Cron)

on:
  schedule:
    # Ogni 5 minuti (0, 5, 10, ..., 55) — nota: GitHub throttle su repo pubblici può ritardare fino a ~1h
    - cron: '*/5 * * * *'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  check_reminders:
    runs-on: ubuntu-latest
    steps:
      - name: Log server time
        run: |
          echo "Server UTC time: $(date -u)"

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          
      - name: Install dependencies
        working-directory: ./server
        run: npm ci

      - name: Run Reminder Script
        working-directory: ./server
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          GITHUB_ACTIONS: "true"
        run: node index.js
